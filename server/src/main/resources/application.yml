server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cardealership?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: ${SQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: never

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    placeholders:
      adminEmail: ${ADMIN_EMAIL}
      adminPasswordHash: ${ADMIN_PASSWORD_HASH}

  mail:
    host: smtp.mail.bg
    port: 465
    username: ${MAIL_USER}
    password: ${MAIL_PASS}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.ssl.trust: smtp.mail.bg

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

jwt:
  secret: ${GOOGLE_JWT_SECRET}

cors:
  allowed-origins:
    - http://localhost:5173

app:
  frontend-url: http://localhost:5173

ml:
  service:
    base-url: ${ML_SERVICE_URL:http://localhost:5000}