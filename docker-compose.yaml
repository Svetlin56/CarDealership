services:
  mysql:
    image: mysql:8.4
    container_name: cardealership-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: cardealership
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  ml-service:
    image: python:3.11-slim
    container_name: cardealership-ml-service
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./ml-service:/app
    environment:
      FLASK_ENV: production
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt
      && if [ ! -f artifacts/car_price_pipeline.pkl ]; then python train.py; fi
      && python -m flask --app app run --host=0.0.0.0 --port=5000"
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import json, urllib.request; data=json.load(urllib.request.urlopen('http://localhost:5000/health')); raise SystemExit(0 if data.get('status') == 'UP' else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 10

  backend:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: cardealership-backend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./server:/app
      - maven_cache:/root/.m2
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cardealership?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}

      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_JWT_SECRET: ${GOOGLE_JWT_SECRET:-change-this-local-development-secret-change-this}

      MAIL_HOST: ${MAIL_HOST:-smtp.mail.bg}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-${MAIL_USER:-}}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_SSL_ENABLE: ${MAIL_SMTP_SSL_ENABLE:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-false}
      MAIL_SMTP_SSL_TRUST: ${MAIL_SMTP_SSL_TRUST:-smtp.mail.bg}

      ML_SERVICE_URL: http://ml-service:5000
      FRONTEND_URL: http://localhost:5173
      APP_SECURITY_COOKIE_SECURE: "false"
      CAR_IMAGES_DIR: /app/uploads/cars
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      ml-service:
        condition: service_started
    command: mvn spring-boot:run

  frontend:
    image: node:22-alpine
    container_name: cardealership-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./client:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  mysql_data:
  maven_cache:
  frontend_node_modules: